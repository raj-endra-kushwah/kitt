<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The End of Trust</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(to bottom,#020111,#191621,#442244);
}

/* Stars */

.star{
position:absolute;
background:white;
border-radius:50%;
animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
from{opacity:.2;}
to{opacity:1;}
}

/* Broken Hearts */

.heart{
position:absolute;
color:#8B0000;
font-size:18px;
animation:float 8s linear infinite;
}

@keyframes float{
from{
transform:translateY(100vh);
opacity:1;
}
to{
transform:translateY(-120px);
opacity:0;
}
}

/* Envelope */

.envelope{
position:relative;
width:220px;
height:150px;
background:#d9d9d9;
cursor:pointer;
transition:.8s;
}

.envelope:before{
content:"";
position:absolute;
top:0;
left:0;
border-left:110px solid transparent;
border-right:110px solid transparent;
border-top:75px solid #888;
transform-origin:top;
transition:1s;
z-index:2;
}

.open:before{
transform:rotateX(180deg);
}

.card{
position:absolute;
width:500px;
max-width:90%;
padding:40px;
background:white;
border-radius:20px;
display:none;
text-align:center;
box-shadow:0 20px 50px rgba(0,0,0,.4);
}

.card h1{
font-family:'Dancing Script',cursive;
font-size:50px;
color:#444;
margin-bottom:20px;
}

#letter{
font-size:19px;
line-height:1.9;
white-space:pre-wrap;
min-height:300px;
}

button{
margin-top:30px;
padding:15px 35px;
border:none;
border-radius:40px;
background:#444;
color:white;
font-size:18px;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.08);
box-shadow:0 0 25px #555;
}

.signature{
margin-top:25px;
font-family:'Dancing Script';
font-size:36px;
color:#555;
}

.fade{
animation:fade 2s;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>

</head>

<body>

<div class="envelope" id="env"></div>

<div class="card" id="card">

<h1>The Final Goodbye</h1>

<p id="letter"></p>

<div class="signature">
A closed chapter
</div>

<button onclick="alert('Some people become memories. Some become lessons. Today, I choose peace.')">
Close This Chapter
</button>

</div>

<script>

// stars

for(let i=0;i<180;i++){

let s=document.createElement("div");

s.className="star";

s.style.width=Math.random()*3+"px";
s.style.height=s.style.width;

s.style.left=Math.random()*100+"vw";
s.style.top=Math.random()*100+"vh";

s.style.animationDelay=Math.random()*2+"s";

document.body.appendChild(s);

}

// broken hearts

function heart(){

let h=document.createElement("div");

h.className="heart";
h.innerHTML="💔";

h.style.left=Math.random()*100+"vw";
h.style.fontSize=(15+Math.random()*25)+"px";
h.style.animationDuration=(5+Math.random()*5)+"s";

document.body.appendChild(h);

setTimeout(()=>h.remove(),10000);

}

setInterval(heart,300);
const message = `

Once, I believed that trust was enough.

I was wrong.

Some lessons arrive wrapped in promises,
only to reveal themselves as pain.

This isn't a story about revenge.
It's a story about learning the value of self-respect.

The trust I gave cannot be taken back.
The time I spent cannot be returned.
But the future is still mine to choose.

I refuse to let betrayal define who I become.

The chapter is over.
The door is closed.
There are no second chances.

Some scars remain,
not to remind me of the pain,
but to remind me never to ignore the truth again.

Goodbye.

💔`;
let i=0;

function type(){

if(i<message.length){

document.getElementById("letter").innerHTML+=message.charAt(i);

i++;

setTimeout(type,35);

}

}

document.getElementById("env").onclick=function(){

this.classList.add("open");

setTimeout(()=>{

this.style.display="none";

document.getElementById("card").style.display="block";
document.getElementById("card").classList.add("fade");

type();

},900);

}

</script>

</body>
</html>
